services:
  bot:
    build:
      context: ./bot
    command: ["sh", "-c", "[ -d node_modules/.bin ] || npm ci; npx prisma generate && npx prisma migrate deploy && npm run dev"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NO_COLOR: "1"
      FORCE_COLOR: "0"
    volumes:
      - ./bot:/app
      - bot_node_modules:/app/node_modules
    networks:
      - backend
    init: true
    restart: unless-stopped

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ./postgres/db_data:/var/lib/postgresql
      - ./postgres/backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

volumes:
  bot_node_modules:

networks:
  backend:
    driver: bridge
